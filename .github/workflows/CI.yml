name: CI

on:
  pull_request:
    branches:
      - develop
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      ENV: ${{ vars.ENV }}
      DEBUG: ${{ vars.DEBUG }}
      DB_SCHEME: ${{ vars.DB_SCHEME }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_USER: ${{ vars.DB_USER }}
      DB_PASSWORD: ${{ vars.DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnose GitHub context and validate vars
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "base_ref=${{ github.base_ref }}"
          echo "head_ref=${{ github.head_ref }}"
          echo "actor=${{ github.actor }}"
          echo "repository=${{ github.repository }}"
          echo "sha=${{ github.sha }}"
          echo "workflow_file=.github/workflows/CI.yml"
          echo "vars_json=${{ toJson(vars) }}"
          sed -n '1,120p' .github/workflows/CI.yml

          all_vars=(ENV DEBUG DB_SCHEME DB_HOST DB_PORT DB_NAME DB_USER DB_PASSWORD)
          for var_name in "${all_vars[@]}"; do
            value="${!var_name-}"
            if [ -n "$value" ]; then
              echo "VAR $var_name set"
            else
              echo "VAR $var_name empty"
            fi
          done

          missing=0
          required_db_vars=(DB_HOST DB_PORT DB_NAME DB_USER DB_PASSWORD)
          for var_name in "${required_db_vars[@]}"; do
            value="${!var_name-}"
            if [ -z "$value" ]; then
              echo "VAR $var_name empty in context"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install bandit

      - name: Unit tests
        run: python -m pytest -q -s -p no:cacheprovider --basetemp .tmp/pytest tests/modules/*/unit

      - name: Integration tests
        run: python -m pytest -q -s -p no:cacheprovider --basetemp .tmp/pytest tests/modules/*/integration

      - name: Bandit security analysis
        run: bandit -r app -ll

  security-tests:
    if: github.base_ref == 'main' && github.head_ref == 'develop'
    runs-on: ubuntu-latest
    needs: ci
    env:
      ENV: ${{ vars.ENV }}
      DEBUG: ${{ vars.DEBUG }}
      DB_SCHEME: ${{ vars.DB_SCHEME }}
      DB_HOST: ${{ vars.DB_HOST }}
      DB_PORT: ${{ vars.DB_PORT }}
      DB_NAME: ${{ vars.DB_NAME }}
      DB_USER: ${{ vars.DB_USER }}
      DB_PASSWORD: ${{ vars.DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Diagnose GitHub context and validate vars
        shell: bash
        run: |
          echo "event_name=${{ github.event_name }}"
          echo "ref=${{ github.ref }}"
          echo "base_ref=${{ github.base_ref }}"
          echo "head_ref=${{ github.head_ref }}"
          echo "actor=${{ github.actor }}"
          echo "repository=${{ github.repository }}"
          echo "sha=${{ github.sha }}"
          echo "workflow_file=.github/workflows/CI.yml"
          echo "vars_json=${{ toJson(vars) }}"
          sed -n '1,120p' .github/workflows/CI.yml

          all_vars=(ENV DEBUG DB_SCHEME DB_HOST DB_PORT DB_NAME DB_USER DB_PASSWORD)
          for var_name in "${all_vars[@]}"; do
            value="${!var_name-}"
            if [ -n "$value" ]; then
              echo "VAR $var_name set"
            else
              echo "VAR $var_name empty"
            fi
          done

          missing=0
          required_db_vars=(DB_HOST DB_PORT DB_NAME DB_USER DB_PASSWORD)
          for var_name in "${required_db_vars[@]}"; do
            value="${!var_name-}"
            if [ -z "$value" ]; then
              echo "VAR $var_name empty in context"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Security tests
        run: python -m pytest -q -s -p no:cacheprovider --basetemp .tmp/pytest tests/security
