name: CD

on:
  push:
    branches:
      - develop
      - main
  workflow_dispatch:

jobs:
  deploy-dev:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy DEV (Render)
        run: curl -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_DEV }}"

  deploy-qa:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy QA (Render)
        run: curl -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_QA }}"

  deploy-prd:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy PRD (Render)
        run: curl -sS -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PRD }}"
